<app-admin-shell>
    <div class="topbar">
        <h1>Paramètres du compte</h1>
    </div>

    <div class="form-card">
        <p style="font-size:13px;color:var(--text-3);margin-bottom:18px;">
            Connecté en tant que <strong>{{ authService.getUsername() }}</strong>
        </p>

        <form (ngSubmit)="onSubmit()">
            <div class="field">
                <label>Mot de passe actuel (obligatoire)</label>
                <input type="password" name="currentPassword" [(ngModel)]="form.currentPassword" required />
            </div>
            <div class="field">
                <label>Nouveau nom d'utilisateur (optionnel)</label>
                <input type="text" name="newUsername" [(ngModel)]="form.newUsername"
                    placeholder="Laisser vide pour ne pas changer" />
            </div>
            <div class="field">
                <label>Nouveau mot de passe (optionnel)</label>
                <input type="password" name="newPassword" [(ngModel)]="form.newPassword"
                    placeholder="Laisser vide pour ne pas changer" />
            </div>

            @if (successMessage()) { <p class="success-message">{{ successMessage() }}</p> }
            @if (errorMessage()) { <p class="error-message">{{ errorMessage() }}</p> }

            <button class="btn-primary" type="submit" [disabled]="isSaving()">
                {{ isSaving() ? 'Enregistrement...' : 'Enregistrer' }}
            </button>
        </form>
    </div>
</app-admin-shell>
