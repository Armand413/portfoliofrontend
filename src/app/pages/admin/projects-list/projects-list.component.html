<app-admin-shell>
    <div class="topbar">
        <h1>Projets</h1>
        <a class="btn-primary" routerLink="/admin/projets/nouveau">+ Nouveau projet</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Titre</th>
                <th>Catégorie</th>
                <th>Créé le</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            @for (p of projects(); track p.id) {
            <tr>
                <td>{{ p.title }}</td>
                <td><span class="tag-cat">{{ p.category | lowercase }}</span></td>
                <td style="color:var(--text-2)">{{ p.createdAt | date:'dd/MM/yyyy' }}</td>
                <td class="actions">
                    <a class="icon-btn" [routerLink]="['/admin/projets', p.id, 'modifier']" title="Modifier">✎</a>
                    <button class="icon-btn danger" (click)="onDelete(p.id)" title="Supprimer">🗑</button>
                </td>
            </tr>
            } @empty {
            <tr>
                <td colspan="4" style="color:var(--text-3)">Aucun projet pour le moment.</td>
            </tr>
            }
        </tbody>
    </table>
</app-admin-shell>
