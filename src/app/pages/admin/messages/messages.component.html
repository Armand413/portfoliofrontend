<app-admin-shell>
    <div class="topbar">
        <h1>Messages</h1>
    </div>
    <div class="msg-list">
        @for (m of messages(); track m.id) {
        <div class="msg" [class.unread]="!m.read">
            <div class="msg-top">
                <span class="name">{{ m.name }}</span>
                <span class="date">{{ m.createdAt | date:'dd/MM/yyyy — HH:mm' }}</span>
            </div>
            <div class="email">{{ m.email }}</div>
            <div class="body">{{ m.message }}</div>
            <div class="msg-actions">
                @if (!m.read) { <button (click)="onMarkAsRead(m.id)">Marquer comme lu</button> }
                <button (click)="onDelete(m.id)">Supprimer</button>
            </div>
        </div>
        } @empty {
        <p style="color:var(--text-3)">Aucun message reçu pour le moment.</p>
        }
    </div>
</app-admin-shell>
